name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract package version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "This workflow expects a tag like v1.2.3" >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag version '$VERSION' is not a valid NuGet version." >&2
            exit 1
          fi

          echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/Aiif.Net/Aiif.Net.csproj

      - name: Pack
        run: |
          dotnet pack src/Aiif.Net/Aiif.Net.csproj \
            --configuration Release \
            --output ./artifacts \
            /p:PackageVersion=${{ steps.version.outputs.package_version }} \
            /p:ContinuousIntegrationBuild=true

      - name: Publish package to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Publish symbols to NuGet
        run: |
          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
